<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>栞 | Travel Assistant</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Cinzel:wght@500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app" v-cloak>
    <div id="app-container" class="bg-washi relative w-full h-full flex flex-col">
        
        <div class="cloud-status absolute top-safe-top left-5 mt-2 z-50 text-[10px] text-theme-accent flex items-center gap-2">
            <i class="fas" :class="isSyncing ? 'fa-spinner animate-spin' : 'fa-check-circle'"></i>
            <span>{{ isSyncing ? 'SYNCING...' : 'SYNCED' }}</span>
        </div>

        <transition name="fade">
            <div v-if="toast.show" class="toast-box">{{ toast.message }}</div>
        </transition>

        <template v-if="!isInitialized">
            <div class="fixed inset-0 z-[1500] bg-[#2C3032] text-white flex flex-col items-center justify-center p-8">
                <h1 class="text-7xl font-serif mb-10 tracking-widest">栞</h1>
                <div class="w-full max-w-xs space-y-4 text-left">
                    <input v-model="ghToken" type="password" class="login-input" placeholder="GitHub Token">
                    <input v-model="ghRepo" class="login-input" placeholder="帳號/專案名稱">
                    <div class="grid grid-cols-2 gap-2">
                        <input v-model="destination" class="login-input" placeholder="目的地">
                        <input v-model="startDate" type="date" class="login-input">
                    </div>
                    <button @click="saveSettings" class="w-full py-4 bg-theme-accent text-theme-main font-bold rounded-xl shadow-lg uppercase tracking-widest">Start Journey</button>
                </div>
            </div>
        </template>

        <template v-else>
            <header class="glass-panel pt-[calc(env(safe-area-inset-top)+40px)] px-6 pb-4">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-[10px] text-theme-accent font-black tracking-[0.2em] uppercase mb-1">Destination</p>
                        <h1 class="text-3xl font-serif font-bold text-theme-main tracking-widest uppercase">{{ destination }}</h1>
                        <p class="text-[10px] text-gray-400 mt-1 font-bold">{{ startDate }}</p>
                    </div>
                    <button @click="showSettingsModal = true" class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-theme-sub shadow-sm"><i class="fas fa-cog"></i></button>
                </div>

                <div v-if="currentTab === 'schedule'" class="flex items-center justify-between mb-4 px-1">
                    <div class="flex gap-2">
                        <button @click="moveDay(currentDayIndex, -1)" :disabled="currentDayIndex === 0" class="day-ctrl-btn" :class="{'opacity-20': currentDayIndex === 0}"><i class="fas fa-arrow-left"></i></button>
                        <button @click="moveDay(currentDayIndex, 1)" :disabled="currentDayIndex === days.length - 1" class="day-ctrl-btn" :class="{'opacity-20': currentDayIndex === days.length - 1}"><i class="fas fa-arrow-right"></i></button>
                    </div>
                    <button @click="deleteDay(currentDayIndex)" class="text-[9px] font-bold text-red-400 uppercase tracking-widest">Delete Day</button>
                </div>

                <div v-if="currentTab === 'schedule'" class="relative">
                    <div ref="scrollContainer" class="flex gap-3 overflow-x-auto no-scrollbar py-2 px-1 scroll-smooth">
                        <button v-for="(day, index) in days" :key="index" :id="'day-card-' + index" @click="selectDay(index)"
                                :class="currentDayIndex === index ? 'day-card-active' : 'day-card-inactive'"
                                class="flex-shrink-0 w-16 h-20 rounded-2xl flex flex-col items-center justify-center transition-all border shadow-sm">
                            <span class="text-[9px] font-bold opacity-60 mb-1">DAY {{ index + 1 }}</span>
                            <span class="text-sm font-serif font-black">{{ getDayInfo(index).date }}</span>
                        </button>
                        <button @click="addNewDay" class="flex-shrink-0 w-16 h-20 rounded-2xl border-2 border-dashed border-gray-200 text-gray-300 flex items-center justify-center"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto pb-40 no-scrollbar p-6">
                <div v-if="currentTab === 'schedule'" class="space-y-4">
                    <div v-for="(item, index) in currentDayItems" :key="index" class="schedule-item-card">
                        <div class="w-1 bg-theme-accent rounded-full mr-4"></div>
                        <div class="flex-1">
                            <span class="text-[10px] font-black text-theme-accent tracking-widest">{{ item.time }}</span>
                            <h3 class="text-lg font-serif font-bold text-theme-main mt-0.5">{{ item.title }}</h3>
                            <p v-if="item.address" class="text-[10px] text-gray-400 mt-1 italic"><i class="fas fa-map-pin mr-1"></i>{{ item.address }}</p>
                        </div>
                    </div>
                    <div v-if="currentDayItems.length === 0" class="text-center py-24 text-gray-300 italic text-xs uppercase tracking-widest">No events scheduled</div>
                </div>
            </main>

            <button @click="onFabClick" class="fab-btn shadow-2xl"><i class="fas fa-plus"></i></button>

            <nav class="nav-bar-container">
                <button @click="currentTab='schedule'" :class="currentTab==='schedule'?'nav-item-active':'nav-item-inactive'" class="nav-item">
                    <i class="fas fa-map-location-dot"></i><span>SCHEDULE</span>
                </button>
                <button @click="currentTab='money'" :class="currentTab==='money'?'nav-item-active':'nav-item-inactive'" class="nav-item">
                    <i class="fas fa-wallet"></i><span>BUDGET</span>
                </button>
                <button @click="currentTab='memo'" :class="currentTab==='memo'?'nav-item-active':'nav-item-inactive'" class="nav-item">
                    <i class="fas fa-note-sticky"></i><span>MEMO</span>
                </button>
            </nav>
        </template>

        <div v-if="showAddModal" class="modal-mask" @click.self="showAddModal = false">
            <div class="modal-card !p-8 !max-w-[24rem]">
                <h2 class="text-center font-serif font-black text-2xl text-theme-main mb-10">New Event</h2>
                
                <div class="space-y-8">
                    <div>
                        <label class="modal-label"><i class="fas fa-location-dot"></i> TITLE</label>
                        <div class="relative">
                            <input v-model="newItem.title" class="premium-input" placeholder="景點或餐廳名稱">
                            <i class="fas fa-search absolute right-6 top-1/2 -translate-y-1/2 text-gray-300"></i>
                        </div>
                    </div>

                    <div class="text-center">
                        <label class="modal-label"><i class="far fa-clock"></i> TIME</label>
                        <div class="time-pill">
                            <input v-model="newItem.hour" class="time-input" maxlength="2" placeholder="09">
                            <span class="text-gray-300 font-bold mx-2">:</span>
                            <input v-model="newItem.minute" class="time-input" maxlength="2" placeholder="00">
                        </div>
                    </div>

                    <div>
                        <label class="modal-label">LINK / ADDRESS</label>
                        <input v-model="newItem.address" class="premium-input" placeholder="地址或相關網址">
                    </div>

                    <div>
                        <label class="modal-label">NOTE</label>
                        <textarea v-model="newItem.note" class="premium-input h-32 resize-none" placeholder="寫下備註..."></textarea>
                    </div>

                    <button @click="addItem" class="btn-gold mt-4 uppercase tracking-widest">Save Event</button>
                </div>
            </div>
        </div>

        <div v-if="showSettingsModal" class="modal-mask" @click.self="showSettingsModal = false">
            <div class="modal-card">
                <h3 class="text-center font-serif font-bold mb-6 text-xl border-b pb-4 uppercase tracking-widest">Settings</h3>
                <div class="space-y-4">
                    <input v-model="ghToken" type="password" class="premium-input" placeholder="GitHub Token">
                    <input v-model="ghRepo" class="premium-input" placeholder="username/repo">
                    <input v-model="destination" class="premium-input text-center font-bold" placeholder="Destination">
                    <input v-model="startDate" type="date" class="premium-input">
                    <button @click="saveSettings" class="btn-gold uppercase tracking-widest">Update Data</button>
                    <button @click="logout" class="w-full py-2 text-red-500 font-bold text-[10px] bg-red-50 rounded-2xl uppercase tracking-widest">Logout</button>
                </div>
            </div>
        </div>

    </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
