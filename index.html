<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>栞 | Travel Assistant</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Cinzel:wght@500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app" v-cloak>
    <div id="app-container" class="bg-washi relative w-full h-full">
        
        <div class="cloud-status absolute top-safe-top left-5 mt-2 z-50 text-[10px] text-theme-accent flex items-center gap-2">
            <i class="fas" :class="isSyncing ? 'fa-spinner animate-spin' : 'fa-github'"></i>
            <span>{{ isSyncing ? '同步中...' : (ghToken ? 'GitHub 已連線' : '等待設定') }}</span>
        </div>

        <transition name="fade">
            <div v-if="toast.show" class="toast-box">{{ toast.message }}</div>
        </transition>

        <template v-if="!isInitialized">
            <div class="fixed inset-0 z-[1500] bg-[#2C3032] text-white flex flex-col items-center justify-center p-8">
                <h1 class="text-7xl font-serif mb-2 tracking-widest">栞</h1>
                <p class="text-[10px] text-theme-accent mb-10 tracking-[0.2em] uppercase">Travel Assistant</p>
                
                <div class="w-full max-w-xs space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 ml-2">GitHub Token</label>
                        <input v-model="ghToken" type="password" class="login-input" placeholder="貼上你的 Token">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 ml-2">Repository</label>
                        <input v-model="ghRepo" class="login-input" placeholder="帳號/專案名稱">
                    </div>
                    <div class="space-y-1 pb-4">
                        <label class="text-[10px] text-gray-500 ml-2">旅程目的地</label>
                        <input v-model="destination" class="login-input text-center" placeholder="要去哪裡旅行？">
                    </div>
                    <button @click="saveSettings" class="w-full py-4 bg-theme-accent text-theme-main font-bold rounded-xl shadow-lg active:scale-95 transition-transform">
                        進入旅程
                    </button>
                </div>
            </div>
        </template>

        <template v-else>
            <header class="glass-panel pt-[calc(env(safe-area-inset-top)+40px)] px-6 pb-5 z-40 flex justify-between items-end h-[calc(140px+env(safe-area-inset-top))]">
                <div class="border-l-2 border-theme-accent pl-3">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">Destination</p>
                    <h1 class="text-3xl font-serif font-medium tracking-widest text-theme-main">{{ destination || '新旅程' }}</h1>
                </div>
                <button @click="showSettingsModal = true" class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-theme-sub shadow-sm">
                    <i class="fas fa-cog"></i>
                </button>
            </header>

            <main class="flex-1 overflow-y-auto pb-40 no-scrollbar">
                <div v-if="currentTab === 'schedule'" class="p-5">
                    <div v-for="(item, index) in currentDayItems" :key="index" class="bg-white p-5 rounded-3xl shadow-sm border-l-4 border-theme-main mb-4 flex justify-between items-center group">
                        <div>
                            <span class="text-xs font-bold text-theme-accent">{{ item.time }}</span>
                            <h3 class="text-lg font-serif font-bold text-theme-main">{{ item.title }}</h3>
                        </div>
                    </div>
                    <div v-if="currentDayItems.length === 0" class="text-center py-24">
                        <i class="fas fa-map-pin text-gray-200 text-3xl mb-4"></i>
                        <p class="text-gray-400 text-sm">點擊下方「+」<br>開始記錄行程</p>
                    </div>
                </div>
                <div v-if="currentTab === 'money'" class="p-10 text-center text-gray-400">記帳功能開發中</div>
                <div v-if="currentTab === 'memo'" class="p-10 text-center text-gray-400">備忘錄開發中</div>
            </main>

            <button @click="onFabClick" class="fab-btn shadow-2xl">
                <i class="fas fa-plus"></i>
            </button>

            <nav class="glass-panel absolute bottom-0 w-full h-[80px] flex justify-around items-center border-t border-gray-100">
                <button @click="currentTab='schedule'" :class="currentTab==='schedule'?'text-theme-accent':'text-theme-sub'"><i class="fas fa-map-marked-alt text-xl"></i></button>
                <button @click="currentTab='money'" :class="currentTab==='money'?'text-theme-accent':'text-theme-sub'"><i class="fas fa-wallet text-xl"></i></button>
                <button @click="currentTab='memo'" :class="currentTab==='memo'?'text-theme-accent':'text-theme-sub'"><i class="fas fa-book text-xl"></i></button>
            </nav>
        </template>

        <div v-if="showSettingsModal" class="modal-mask" @click.self="showSettingsModal = false">
            <div class="modal-card">
                <h3 class="text-center font-serif font-bold mb-6 text-lg border-b pb-4 text-theme-main">旅程管理</h3>
                <div class="space-y-4">
                    <div>
                        <label class="input-label">旅程目的地</label>
                        <input v-model="destination" class="input-rounded text-center font-bold">
                    </div>
                    <div class="pt-6 space-y-3">
                        <button @click="saveToGitHub" class="w-full py-4 bg-theme-main text-white font-bold rounded-3xl shadow-sm">儲存目的地修改</button>
                        <div class="flex gap-2">
                            <button @click="clearJourney" class="flex-1 py-3 bg-orange-50 text-orange-600 font-bold rounded-2xl text-xs">清空行程</button>
                            <button @click="logout" class="flex-1 py-3 bg-red-50 text-red-500 font-bold rounded-2xl text-xs">登出帳號</button>
                        </div>
                        <button @click="showSettingsModal = false" class="w-full py-2 text-gray-400 text-xs">關閉</button>
                    </div>
                </div>
            </div>
        </div>

        <div v-if="showAddModal" class="modal-mask" @click.self="showAddModal = false">
            <div class="modal-card">
                <h3 class="text-center font-serif font-bold mb-6 text-lg border-b pb-4">新增行程</h3>
                <div class="space-y-6">
                    <div><label class="input-label">預計時間</label><input v-model="newItem.time" class="input-rounded" placeholder="10:30"></div>
                    <div><label class="input-label">行程內容</label><input v-model="newItem.title" class="input-rounded" placeholder="景點名稱"></div>
                    <div class="flex gap-3">
                        <button @click="showAddModal = false" class="flex-1 py-4 bg-gray-100 text-gray-500 font-bold rounded-3xl">取消</button>
                        <button @click="addItem" class="flex-2 py-4 bg-theme-main text-white font-bold rounded-3xl">確認</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
