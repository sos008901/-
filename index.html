<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>栞 | Travel Assistant</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Cinzel:wght@500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app" v-cloak>
    <div id="app-container" class="bg-washi relative w-full h-full flex flex-col">
        
        <div class="cloud-status absolute top-safe-top left-5 mt-2 z-50 text-[10px] text-theme-accent flex items-center gap-2">
            <i class="fas" :class="isSyncing ? 'fa-spinner animate-spin' : 'fa-check-circle'"></i>
            <span>{{ isSyncing ? '雲端同步中' : '已與雲端同步' }}</span>
        </div>

        <transition name="fade"><div v-if="toast.show" class="toast-box">{{ toast.message }}</div></transition>

        <template v-if="!isInitialized">
            <div class="fixed inset-0 z-[1500] bg-[#2C3032] text-white flex flex-col items-center justify-center p-8">
                <h1 class="text-7xl font-serif mb-10 tracking-widest">栞</h1>
                <div class="w-full max-w-xs space-y-4">
                    <input v-model="ghToken" type="password" class="login-input" placeholder="GitHub Token">
                    <input v-model="ghRepo" class="login-input" placeholder="帳號/專案名稱">
                    <div class="grid grid-cols-2 gap-2">
                        <input v-model="destination" class="login-input" placeholder="目的地">
                        <input v-model="startDate" type="date" class="login-input">
                    </div>
                    <button @click="saveSettings" class="w-full py-4 bg-theme-accent text-theme-main font-bold rounded-xl">開始旅程</button>
                </div>
            </div>
        </template>

        <template v-else>
            <header class="glass-panel pt-[calc(env(safe-area-inset-top)+40px)] px-6 pb-4">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-[10px] text-theme-accent font-black tracking-[0.2em] uppercase mb-1">Travel to</p>
                        <h1 class="text-3xl font-serif font-bold text-theme-main tracking-widest">{{ destination || '新旅程' }}</h1>
                        <p class="text-[10px] text-gray-400 mt-1 font-bold">{{ startDate }}</p>
                    </div>
                    <button @click="showSettingsModal = true" class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-theme-sub"><i class="fas fa-cog"></i></button>
                </div>

                <div v-if="currentTab === 'schedule'" class="flex items-center justify-between mb-4 px-1">
                    <div class="flex gap-2">
                        <button @click="moveDay(currentDayIndex, -1)" :disabled="currentDayIndex === 0" class="day-ctrl-btn" :class="{'opacity-20': currentDayIndex === 0}">
                            <i class="fas fa-arrow-left"></i> 前移
                        </button>
                        <button @click="moveDay(currentDayIndex, 1)" :disabled="currentDayIndex === days.length - 1" class="day-ctrl-btn" :class="{'opacity-20': currentDayIndex === days.length - 1}">
                            後移 <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                    <button @click="deleteDay(currentDayIndex)" class="text-[10px] font-bold text-red-400 px-3 py-1 bg-red-50 rounded-full">
                        <i class="fas fa-trash-alt mr-1"></i> 刪除
                    </button>
                </div>

                <div v-if="currentTab === 'schedule'" class="relative">
                    <div ref="scrollContainer" class="flex gap-3 overflow-x-auto no-scrollbar py-4 px-1 scroll-smooth">
                        <button v-for="(day, index) in days" :key="index" 
                                :id="'day-card-' + index"
                                @click="selectDay(index)"
                                :class="currentDayIndex === index ? 'day-card-active' : 'day-card-inactive'"
                                class="flex-shrink-0 w-16 h-20 rounded-2xl flex flex-col items-center justify-center transition-all duration-300 shadow-sm border">
                            <span class="text-[10px] font-bold opacity-60 mb-0.5">D{{ index + 1 }}</span>
                            <span class="text-sm font-serif font-black">{{ getDayInfo(index).date }}</span>
                            <span class="text-[9px] font-medium opacity-80">{{ getDayInfo(index).week }}</span>
                        </button>
                        
                        <button @click="addNewDay" class="flex-shrink-0 w-16 h-20 rounded-2xl border-2 border-dashed border-gray-200 text-gray-300 flex flex-col items-center justify-center">
                            <i class="fas fa-plus text-xs"></i>
                        </button>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto pb-40 no-scrollbar p-6">
                <div v-if="currentTab === 'schedule'" class="space-y-4">
                    <div v-for="(item, index) in currentDayItems" :key="index" class="schedule-item">
                        <div class="w-1 bg-theme-accent rounded-full mr-4"></div>
                        <div class="flex-1">
                            <span class="text-[10px] font-black text-theme-accent tracking-widest">{{ item.time }}</span>
                            <h3 class="text-lg font-serif font-bold text-theme-main">{{ item.title }}</h3>
                        </div>
                    </div>
                    <div v-if="currentDayItems.length === 0" class="text-center py-20 text-gray-300 text-sm">點擊「+」新增行程</div>
                </div>

                <div v-if="currentTab === 'money'" class="space-y-3">
                    <div v-for="(exp, idx) in expenses" :key="idx" class="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm">
                        <span class="font-bold">{{ exp.item }}</span>
                        <span class="font-serif text-theme-accent font-black">$ {{ exp.amount }}</span>
                    </div>
                </div>
                <div v-if="currentTab === 'memo'" class="space-y-4">
                    <div v-for="(memo, idx) in memos" :key="idx" class="bg-white p-5 rounded-2xl shadow-sm italic text-sm">
                        {{ memo.content }}
                    </div>
                </div>
            </main>

            <button @click="onFabClick" class="fab-btn"><i class="fas fa-plus"></i></button>

            <nav class="glass-panel h-[80px] flex justify-around items-center border-t border-gray-100">
                <button @click="currentTab='schedule'" :class="currentTab==='schedule'?'text-theme-accent scale-110':'text-gray-300'"><i class="fas fa-map-marked-alt text-xl"></i></button>
                <button @click="currentTab='money'" :class="currentTab==='money'?'text-theme-accent scale-110':'text-gray-300'"><i class="fas fa-wallet text-xl"></i></button>
                <button @click="currentTab='memo'" :class="currentTab==='memo'?'text-theme-accent scale-110':'text-gray-300'"><i class="fas fa-book text-xl"></i></button>
            </nav>
        </template>

        <div v-if="showAddModal" class="modal-mask" @click.self="showAddModal = false">
            <div class="modal-card">
                <h3 class="text-center font-serif font-black mb-6">新增行程 (D{{currentDayIndex+1}})</h3>
                <input v-model="newItem.time" class="input-rounded mb-3" placeholder="時間 (如 10:00)">
                <input v-model="newItem.title" class="input-rounded mb-6" placeholder="要去哪裡？">
                <button @click="addItem" class="w-full py-4 bg-theme-main text-white font-bold rounded-3xl">確定</button>
            </div>
        </div>
        
        <div v-if="showMoneyModal" class="modal-mask" @click.self="showMoneyModal = false">
            <div class="modal-card">
                <h3 class="text-center font-serif font-black mb-6">新增支出</h3>
                <input v-model="newExpense.item" class="input-rounded mb-3" placeholder="項目">
                <input v-model="newExpense.amount" type="number" class="input-rounded mb-6" placeholder="金額">
                <button @click="addExpense" class="w-full py-4 bg-theme-main text-white font-bold rounded-3xl">儲存</button>
            </div>
        </div>

        <div v-if="showMemoModal" class="modal-mask" @click.self="showMemoModal = false">
            <div class="modal-card">
                <h3 class="text-center font-serif font-black mb-6">新增備忘</h3>
                <textarea v-model="newMemo.content" class="input-rounded h-32 mb-6" placeholder="內容..."></textarea>
                <button @click="addMemo" class="w-full py-4 bg-theme-main text-white font-bold rounded-3xl">儲存</button>
            </div>
        </div>

        <div v-if="showSettingsModal" class="modal-mask" @click.self="showSettingsModal = false">
            <div class="modal-card text-center space-y-4">
                <h3 class="font-serif font-black mb-4">旅程設定</h3>
                <input v-model="destination" class="input-rounded" placeholder="目的地">
                <input v-model="startDate" type="date" class="input-rounded">
                <button @click="saveToGitHub" class="w-full py-4 bg-theme-main text-white font-bold rounded-3xl">更新雲端資料</button>
                <button @click="logout" class="w-full py-2 text-red-400 text-xs">登出並清除緩存</button>
            </div>
        </div>

    </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
