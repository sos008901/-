<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>栞 | Travel Assistant</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Cinzel:wght@500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app" v-cloak>
    <div id="app-container" class="bg-washi relative w-full h-full flex flex-col">
        <div class="cloud-status absolute top-safe-top left-5 mt-2 z-50 text-[10px] text-theme-accent flex items-center gap-2">
            <i class="fas" :class="isSyncing ? 'fa-spinner animate-spin' : 'fa-github'"></i>
            <span>{{ isSyncing ? 'SYNCING...' : 'SYNCED' }}</span>
        </div>

        <transition name="fade"><div v-if="toast.show" class="toast-box">{{ toast.message }}</div></transition>

        <template v-if="!ghToken || !ghRepo">
            <div class="fixed inset-0 z-[1500] bg-[#2C3032] text-white flex flex-col items-center justify-center p-6 text-center">
                <h1 class="text-7xl font-serif mb-6 tracking-widest">栞</h1>
                <div class="w-full max-w-xs space-y-4">
                    <input v-model="ghToken" type="password" class="login-input" placeholder="GitHub Token">
                    <input v-model="ghRepo" class="login-input" placeholder="帳號/專案名稱">
                    <button @click="showSettingsModal = true" class="w-full py-4 bg-theme-accent text-theme-main font-bold rounded-xl">前往設定</button>
                </div>
            </div>
        </template>

        <template v-else>
            <header class="glass-panel pt-[calc(env(safe-area-inset-top)+40px)] px-6 pb-5">
                <div class="flex justify-between items-end">
                    <div class="border-l-2 border-theme-accent pl-3">
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">Destination</p>
                        <h1 class="text-4xl font-serif font-medium tracking-widest text-theme-main uppercase">{{ destination }}</h1>
                    </div>
                    <button @click="showSettingsModal = true" class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-theme-sub shadow-sm"><i class="fas fa-cog"></i></button>
                </div>

                <div class="flex gap-3 overflow-x-auto no-scrollbar py-6">
                    <button v-for="(day, index) in days" :key="index" @click="currentDayIndex = index"
                            :class="currentDayIndex === index ? 'day-card-active' : 'day-card-inactive'"
                            class="flex-shrink-0 w-16 h-20 rounded-2xl flex flex-col items-center justify-center transition-all border shadow-sm">
                        <span class="text-[9px] font-bold opacity-60 mb-1">DAY {{ index + 1 }}</span>
                        <span class="text-sm font-serif font-black">{{ getDayInfo(index).date }}</span>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto pb-40 no-scrollbar p-6">
                <div v-if="currentTab === 'schedule'" class="space-y-4">
                    <div v-for="item in currentDayItems" class="bg-white p-5 rounded-3xl shadow-sm border-l-4 border-theme-main">
                        <span class="text-xs font-bold text-theme-accent">{{ item.time }}</span>
                        <h3 class="text-lg font-serif font-bold text-theme-main">{{ item.title }}</h3>
                    </div>
                    <div v-if="currentDayItems.length === 0" class="text-center py-20 text-gray-300 text-sm italic">尚無行程</div>
                </div>
            </main>

            <button @click="onFabClick" class="fab-btn"><i class="fas fa-plus"></i></button>

            <nav class="nav-bar-container">
                <button @click="currentTab='schedule'" :class="currentTab==='schedule'?'nav-item-active':'nav-item-inactive'" class="nav-item">
                    <i class="fas fa-map-location-dot"></i><span>SCHEDULE</span>
                </button>
                <button @click="currentTab='money'" :class="currentTab==='money'?'nav-item-active':'nav-item-inactive'" class="nav-item">
                    <i class="fas fa-wallet"></i><span>BUDGET</span>
                </button>
                <button @click="currentTab='memo'" :class="currentTab==='memo'?'nav-item-active':'nav-item-inactive'" class="nav-item">
                    <i class="fas fa-note-sticky"></i><span>MEMO</span>
                </button>
            </nav>
        </template>

        <div v-if="showAddModal" class="modal-mask" @click.self="showAddModal = false">
            <div class="modal-card !p-8 !max-w-[22rem]">
                <h2 class="text-center font-serif font-black text-2xl text-theme-main mb-8 uppercase tracking-widest">New Event</h2>
                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="modal-label">TITLE</label>
                        <div class="relative"><input v-model="newItem.title" class="modal-input" placeholder="景點名稱"><i class="fas fa-search absolute right-5 top-1/2 -translate-y-1/2 text-gray-300"></i></div>
                    </div>
                    <div class="space-y-2 text-center">
                        <label class="modal-label">TIME</label>
                        <div class="flex items-center justify-center gap-4 bg-[#F2F4F4] py-3 rounded-2xl">
                            <input v-model="newItem.timeHour" class="time-field" maxlength="2"><span>:</span><input v-model="newItem.timeMinute" class="time-field" maxlength="2">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="modal-label text-center block">LINK / ADDRESS</label>
                        <input v-model="newItem.address" class="modal-input" placeholder="地址或網址">
                    </div>
                    <div class="space-y-2 text-center">
                        <label class="modal-label block">NOTE</label>
                        <textarea v-model="newItem.note" class="modal-input h-24 resize-none" placeholder="寫下備註..."></textarea>
                    </div>
                    <button @click="addItem" class="save-event-btn">SAVE EVENT</button>
                </div>
            </div>
        </div>

        <div v-if="showSettingsModal" class="modal-mask" @click.self="showSettingsModal = false">
            <div class="modal-card">
                <h3 class="text-center font-serif font-bold mb-6 text-lg border-b pb-4">Settings</h3>
                <div class="space-y-4">
                    <input v-model="ghToken" type="password" class="modal-input" placeholder="GitHub Token">
                    <input v-model="ghRepo" class="modal-input" placeholder="帳號/專案名稱">
                    <input v-model="destination" class="modal-input text-center font-bold" placeholder="目的地">
                    <button @click="saveSettings" class="save-event-btn">儲存並同步</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
