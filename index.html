<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>栞 | Travel Assistant</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Cinzel:wght@500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app" v-cloak>
    <div id="app-container" class="bg-washi relative w-full h-full flex flex-col">
        
        <div class="cloud-status absolute top-safe-top left-5 mt-2 z-50 text-[10px] text-theme-accent flex items-center gap-2">
            <i class="fas" :class="isSyncing ? 'fa-spinner animate-spin' : 'fa-check-circle'"></i>
            <span>{{ isSyncing ? 'SYNCING...' : 'SYNCED' }}</span>
        </div>

        <transition name="fade"><div v-if="toast.show" class="toast-box">{{ toast.message }}</div></transition>

        <template v-if="!isInitialized">
            <div class="fixed inset-0 z-[1500] bg-[#2C3032] text-white flex flex-col items-center justify-center p-8 overflow-y-auto text-center">
                <h1 class="text-7xl font-serif mb-2 tracking-widest">栞</h1>
                <p class="text-[10px] text-theme-accent mb-10 tracking-[0.2em] uppercase">Travel Assistant</p>
                
                <div class="flex bg-[#1E2122] p-1 rounded-2xl mb-8 w-full max-w-xs shadow-inner">
                    <button @click="loginMode = 'quick'" :class="loginMode === 'quick' ? 'bg-[#2C3032] text-white shadow-lg' : 'text-gray-500'" class="flex-1 py-2.5 text-[10px] font-bold rounded-xl transition-all uppercase tracking-widest">Existing</button>
                    <button @click="loginMode = 'new'" :class="loginMode === 'new' ? 'bg-[#2C3032] text-white shadow-lg' : 'text-gray-500'" class="flex-1 py-2.5 text-[10px] font-bold rounded-xl transition-all uppercase tracking-widest">New Journey</button>
                </div>

                <div class="w-full max-w-xs space-y-4 text-left">
                    <div class="space-y-1">
                        <label class="premium-label text-gray-500 ml-2">GitHub Token</label>
                        <input v-model="ghToken" type="password" class="login-input" placeholder="ghp_xxxxxxxx">
                    </div>
                    <div class="space-y-1">
                        <label class="premium-label text-gray-500 ml-2">Repository</label>
                        <input v-model="ghRepo" class="login-input" placeholder="帳號/儲存庫名稱">
                    </div>
                    
                    <transition name="fade">
                        <div v-if="loginMode === 'new'" class="grid grid-cols-2 gap-4 w-full pt-2">
                            <div class="space-y-1">
                                <label class="premium-label text-gray-500 ml-2">目的地</label>
                                <input v-model="destination" class="login-input" placeholder="福岡">
                            </div>
                            <div class="space-y-1">
                                <label class="premium-label text-gray-500 ml-2">起始日期</label>
                                <input v-model="startDate" type="date" class="login-input text-xs">
                            </div>
                        </div>
                    </transition>
                    
                    <button @click="saveSettings" class="w-full py-4 mt-6 bg-theme-accent text-theme-main font-bold rounded-xl shadow-lg active:scale-95 transition-transform uppercase tracking-widest">
                        {{ loginMode === 'quick' ? 'RESUME JOURNEY' : 'START JOURNEY' }}
                    </button>
                </div>
            </div>
        </template>

        <template v-else>
            <header class="glass-panel pt-[calc(env(safe-area-inset-top)+40px)] px-6 pb-4 shadow-sm">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-[10px] text-theme-accent font-black tracking-widest uppercase mb-1">Destination</p>
                        <h1 class="text-3xl font-serif font-bold text-theme-main tracking-widest uppercase line-clamp-1">{{ destination }}</h1>
                        <p class="text-[10px] text-gray-400 mt-1 font-bold">{{ startDate }}</p>
                    </div>
                    <button @click="showSettingsModal = true" class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-theme-sub shadow-sm active:scale-90"><i class="fas fa-cog"></i></button>
                </div>

                <div v-if="currentTab === 'schedule'">
                    <div class="flex items-center justify-between mb-4 px-1">
                        <div class="flex gap-2">
                            <button @click="moveDay(currentDayIndex, -1)" :disabled="currentDayIndex === 0" class="day-ctrl-btn" :class="{'opacity-20': currentDayIndex === 0}"><i class="fas fa-chevron-left"></i></button>
                            <button @click="moveDay(currentDayIndex, 1)" :disabled="currentDayIndex === days.length - 1" class="day-ctrl-btn" :class="{'opacity-20': currentDayIndex === days.length - 1}"><i class="fas fa-chevron-right"></i></button>
                        </div>
                        <button @click="deleteDay(currentDayIndex)" class="text-[9px] font-bold text-red-400 uppercase tracking-widest active:text-red-600">Delete Day</button>
                    </div>
                    <div ref="scrollContainer" class="flex gap-3 overflow-x-auto no-scrollbar py-2 px-1 scroll-smooth">
                        <button v-for="(day, index) in days" :key="index" :id="'day-card-' + index" @click="selectDay(index)"
                                :class="currentDayIndex === index ? 'day-card-active' : 'day-card-inactive'"
                                class="flex-shrink-0 w-16 h-20 rounded-2xl flex flex-col items-center justify-center transition-all duration-300 shadow-sm border">
                            <span class="text-[9px] font-bold opacity-60 mb-1 uppercase">Day {{ index + 1 }}</span>
                            <span class="text-sm font-serif font-black">{{ getDayInfo(index).date }}</span>
                        </button>
                        <button @click="addNewDay" class="flex-shrink-0 w-16 h-20 rounded-2xl border-2 border-dashed border-gray-200 text-gray-300 flex items-center justify-center active:bg-gray-100"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto pb-40 no-scrollbar p-6">
                <div v-if="currentTab === 'schedule'" class="space-y-5">
                    <div v-for="(item, index) in currentDayItems" :key="index" 
                         class="schedule-item-card"
                         :class="{ 'dragging-now': dragSourceIndex === index }"
                         @click="openEditModal(index)">
                        <div class="w-1 bg-theme-accent rounded-full mr-4 transition-colors"></div>
                        <div class="flex-1 overflow-hidden text-left">
                            <div class="flex justify-between items-start">
                                <span class="text-[10px] font-black text-theme-accent tracking-widest">{{ item.time }}</span>
                                <div class="drag-handle p-2 -mr-2 -mt-2" 
                                     @touchstart.stop="handleTouchStart($event, index)"
                                     @touchmove.stop="handleTouchMove($event)"
                                     @touchend.stop="handleTouchEnd">
                                    <i class="fas fa-grip-vertical text-gray-300 text-xs"></i>
                                </div>
                            </div>
                            <h3 class="text-lg font-serif font-bold text-theme-main mt-0.5 truncate">{{ item.title }}</h3>
                            <p v-if="item.address" class="text-[10px] text-gray-400 mt-1 italic truncate"><i class="fas fa-map-pin mr-1 text-[8px]"></i>{{ item.address }}</p>
                            <div v-if="item.note" class="note-preview-box">{{ item.note }}</div>
                        </div>
                    </div>
                    <div v-if="currentDayItems.length === 0" class="text-center py-24 text-gray-300 italic text-xs uppercase tracking-widest">No events scheduled</div>
                </div>
            </main>

            <button @click="onFabClick" class="fab-btn"><i class="fas fa-plus"></i></button>

            <nav class="nav-bar-container">
                <button @click="currentTab='schedule'" :class="currentTab==='schedule'?'nav-item-active':'nav-item-inactive'" class="nav-item">
                    <i class="fas fa-map-location-dot"></i><span>SCHEDULE</span>
                </button>
                <button @click="currentTab='money'" :class="currentTab==='money'?'nav-item-active':'nav-item-inactive'" class="nav-item">
                    <i class="fas fa-wallet"></i><span>BUDGET</span>
                </button>
                <button @click="currentTab='memo'" :class="currentTab==='memo'?'nav-item-active':'nav-item-inactive'" class="nav-item">
                    <i class="fas fa-note-sticky"></i><span>MEMO</span>
                </button>
            </nav>
        </template>

        <div v-if="showSettingsModal" class="modal-mask" @click.self="showSettingsModal = false">
            <div class="modal-card">
                <h3 class="font-serif font-black mb-6 text-xl text-center border-b pb-4 uppercase tracking-widest">Settings</h3>
                <div class="space-y-5 text-left">
                    <div class="space-y-2"><label class="premium-label">Destination</label><input v-model="destination" class="premium-input text-center font-bold"></div>
                    <div class="space-y-2"><label class="premium-label">Start Date</label><input v-model="startDate" type="date" class="premium-input"></div>
                    <button @click="saveToGitHub" class="btn-gold uppercase tracking-widest">UPDATE CLOUD</button>
                    <div class="pt-4 flex gap-3">
                        <button @click="logout" class="flex-1 py-3 text-red-500 font-bold text-xs bg-red-50 rounded-2xl active:scale-95">LOGOUT</button>
                        <button @click="showSettingsModal = false" class="flex-1 py-3 text-gray-400 font-bold text-xs bg-gray-50 rounded-2xl">CLOSE</button>
                    </div>
                </div>
            </div>
        </div>

        <div v-if="showAddModal" class="modal-mask" @click.self="showAddModal = false">
            <div class="modal-card !p-8 !max-w-[24rem]">
                <h2 class="text-center font-serif font-black text-2xl text-theme-main mb-10 uppercase tracking-widest">{{ editingIndex === -1 ? 'New Event' : 'Edit Event' }}</h2>
                <div class="space-y-8 text-left">
                    <div>
                        <label class="premium-label flex items-center justify-center gap-2 uppercase tracking-widest"><i class="fas fa-location-dot text-[10px]"></i> TITLE</label>
                        <div class="relative"><input v-model="newItem.title" class="premium-input" placeholder="景點名稱"><i class="fas fa-search absolute right-6 top-1/2 -translate-y-1/2 text-gray-300"></i></div>
                    </div>
                    <div class="text-center">
                        <label class="premium-label flex items-center justify-center gap-2 uppercase tracking-widest"><i class="far fa-clock text-[10px]"></i> TIME</label>
                        <div class="time-pill">
                            <input v-model="newItem.hour" class="time-input" maxlength="2" placeholder="09">
                            <span class="text-gray-300 font-bold mx-2">:</span>
                            <input v-model="newItem.minute" class="time-input" maxlength="2" placeholder="00">
                        </div>
                    </div>
                    <div><label class="premium-label text-center block uppercase tracking-widest">LINK / ADDRESS</label><input v-model="newItem.address" class="premium-input" placeholder="地址或網址"></div>
                    <div><label class="premium-label text-center block uppercase tracking-widest">NOTE</label><textarea v-model="newItem.note" class="premium-input h-32 resize-none" placeholder="寫下備註..."></textarea></div>
                    <button @click="addItem" class="btn-gold uppercase tracking-widest">SAVE EVENT</button>
                    <button v-if="editingIndex !== -1" @click="deleteItem" class="text-[10px] font-bold text-red-400 py-2 uppercase tracking-widest text-center w-full active:scale-95">Delete Event</button>
                </div>
            </div>
        </div>

    </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
