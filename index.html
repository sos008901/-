<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>栞 | Travel Assistant</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Cinzel:wght@500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app" v-cloak>
    <div id="app-container" class="bg-washi relative w-full h-full flex flex-col">
        
        <div class="cloud-status absolute top-safe-top left-5 mt-2 z-50 text-[10px] text-theme-accent flex items-center gap-2">
            <i class="fas" :class="isSyncing ? 'fa-spinner animate-spin' : 'fa-check-circle'"></i>
            <span>{{ isSyncing ? 'SYNCING...' : 'SYNCED' }}</span>
        </div>

        <transition name="fade"><div v-if="toast.show" class="toast-box">{{ toast.message }}</div></transition>

        <template v-if="!isInitialized">
            <div class="fixed inset-0 z-[1500] bg-[#2C3032] text-white flex flex-col items-center justify-center p-8">
                <h1 class="text-7xl font-serif mb-10 tracking-widest">栞</h1>
                <div class="w-full max-w-xs space-y-4">
                    <input v-model="ghToken" type="password" class="login-input" placeholder="GitHub Token">
                    <input v-model="ghRepo" class="login-input" placeholder="帳號/專案名稱">
                    <div class="grid grid-cols-2 gap-2">
                        <input v-model="destination" class="login-input" placeholder="目的地">
                        <input v-model="startDate" type="date" class="login-input">
                    </div>
                    <button @click="saveSettings" class="w-full py-4 bg-theme-accent text-theme-main font-bold rounded-xl shadow-lg">START JOURNEY</button>
                </div>
            </div>
        </template>

        <template v-else>
            <header class="glass-panel pt-[calc(env(safe-area-inset-top)+40px)] px-6 pb-4">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-[10px] text-theme-accent font-black tracking-[0.2em] uppercase mb-1">Destination</p>
                        <h1 class="text-3xl font-serif font-bold text-theme-main tracking-widest uppercase">{{ destination || 'New Trip' }}</h1>
                        <p class="text-[10px] text-gray-400 mt-1 font-bold">{{ startDate }}</p>
                    </div>
                    <button @click="showSettingsModal = true" class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-theme-sub"><i class="fas fa-cog"></i></button>
                </div>

                <div v-if="currentTab === 'schedule'">
                    <div class="flex items-center justify-between mb-4 px-1">
                        <div class="flex gap-2">
                            <button @click="moveDay(currentDayIndex, -1)" :disabled="currentDayIndex === 0" class="day-ctrl-btn" :class="{'opacity-20': currentDayIndex === 0}"><i class="fas fa-arrow-left"></i></button>
                            <button @click="moveDay(currentDayIndex, 1)" :disabled="currentDayIndex === days.length - 1" class="day-ctrl-btn" :class="{'opacity-20': currentDayIndex === days.length - 1}"><i class="fas fa-arrow-right"></i></button>
                        </div>
                        <button @click="deleteDay(currentDayIndex)" class="text-[9px] font-bold text-red-400 uppercase tracking-widest">Delete Day</button>
                    </div>
                    <div ref="scrollContainer" class="flex gap-3 overflow-x-auto no-scrollbar py-2 px-1 scroll-smooth">
                        <button v-for="(day, index) in days" :key="index" :id="'day-card-' + index" @click="selectDay(index)"
                                :class="currentDayIndex === index ? 'day-card-active' : 'day-card-inactive'"
                                class="flex-shrink-0 w-16 h-20 rounded-2xl flex flex-col items-center justify-center transition-all duration-300 shadow-sm border">
                            <span class="text-[9px] font-bold opacity-60 mb-1">DAY {{ index + 1 }}</span>
                            <span class="text-sm font-serif font-black">{{ getDayInfo(index).date }}</span>
                        </button>
                        <button @click="addNewDay" class="flex-shrink-0 w-16 h-20 rounded-2xl border-2 border-dashed border-gray-200 text-gray-300 flex items-center justify-center"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto pb-40 no-scrollbar p-6">
                <div v-if="currentTab === 'schedule'" class="space-y-4">
                    <div v-for="(item, index) in currentDayItems" :key="index" class="schedule-item">
                        <div class="w-1 bg-theme-accent rounded-full mr-4"></div>
                        <div class="flex-1">
                            <span class="text-[10px] font-black text-theme-accent tracking-widest">{{ item.time }}</span>
                            <h3 class="text-lg font-serif font-bold text-theme-main">{{ item.title }}</h3>
                        </div>
                    </div>
                </div>
                <div v-if="currentTab === 'money'" class="p-10 text-center text-gray-300">Budget list is empty</div>
                <div v-if="currentTab === 'memo'" class="p-10 text-center text-gray-300">Memo is empty</div>
            </main>

            <button @click="onFabClick" class="fab-btn"><i class="fas fa-plus"></i></button>

            <nav class="nav-bar-container">
                <button @click="currentTab='schedule'" :class="currentTab==='schedule'?'nav-item-active':'nav-item-inactive'" class="nav-item">
                    <i class="fas fa-map-location-dot"></i>
                    <span>SCHEDULE</span>
                </button>
                <button @click="currentTab='money'" :class="currentTab==='money'?'nav-item-active':'nav-item-inactive'" class="nav-item">
                    <i class="fas fa-wallet"></i>
                    <span>BUDGET</span>
                </button>
                <button @click="currentTab='memo'" :class="currentTab==='memo'?'nav-item-active':'nav-item-inactive'" class="nav-item">
                    <i class="fas fa-note-sticky"></i>
                    <span>MEMO</span>
                </button>
            </nav>
        </template>

        <div v-if="showAddModal" class="modal-mask" @click.self="showAddModal = false">
            <div class="modal-card !p-8 !max-w-[22rem]">
                <h2 class="text-center font-serif font-black text-xl mb-8 uppercase tracking-widest">New Event</h2>
                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="modal-label">Title</label>
                        <input v-model="newItem.title" class="modal-input" placeholder="Event Name">
                    </div>
                    <div class="space-y-2">
                        <label class="modal-label text-center block">Time</label>
                        <div class="flex items-center justify-center gap-4 bg-[#F2F4F4] py-3 rounded-2xl">
                            <input v-model="newItem.timeHour" class="time-field" placeholder="09">
                            <span>:</span>
                            <input v-model="newItem.timeMinute" class="time-field" placeholder="00">
                        </div>
                    </div>
                    <button @click="addItem" class="save-event-btn">SAVE EVENT</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
