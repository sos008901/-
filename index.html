<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>栞 | Travel Assistant</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Cinzel:wght@500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F4F2EE]">
    <div id="app">
        <div v-if="!isAppReady" class="fixed inset-0 flex items-center justify-center bg-[#F4F2EE] z-[3000]">
            <div class="text-center">
                <h1 class="text-4xl font-serif mb-4 tracking-widest text-[#2C3032]">栞</h1>
                <p class="text-[10px] font-serif animate-pulse uppercase tracking-widest text-gray-400">Loading Journey...</p>
            </div>
        </div>

        <div id="app-container" class="bg-washi relative w-full h-full flex flex-col mx-auto" style="max-width: 480px;">
            <div v-if="isInitialized" class="cloud-status absolute top-12 left-6 z-50 text-[10px] text-[#C5A059] flex items-center gap-2">
                <i class="fas" :class="isSyncing ? 'fa-spinner animate-spin' : 'fa-check-circle'"></i>
                <span>{{ isSyncing ? 'Syncing...' : 'Synced' }}</span>
            </div>

            <transition name="fade"><div v-if="toast.show" class="toast-box">{{ toast.message }}</div></transition>

            <template v-if="!isInitialized">
                <div class="fixed inset-0 z-[1500] bg-[#2C3032] text-white flex flex-col items-center justify-center p-8 text-center">
                    <h1 class="text-7xl font-serif mb-2 tracking-widest">栞</h1>
                    <p class="text-[10px] text-[#C5A059] mb-10 tracking-[0.2em] uppercase">Travel Assistant</p>
                    <div class="w-full max-w-xs space-y-4">
                        <input v-model.trim="ghToken" type="password" class="login-input" placeholder="GitHub Token">
                        <input v-model.trim="ghRepo" class="login-input" placeholder="Username/Repo">
                        <button @click="saveSettings" class="btn-gold mt-4">START JOURNEY</button>
                    </div>
                </div>
            </template>

            <template v-else>
                <header class="pt-20 px-6 pb-4">
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex-1 min-w-0">
                            <p class="text-[10px] text-[#C5A059] font-black tracking-widest uppercase mb-1">Destination</p>
                            <h1 class="text-3xl font-serif font-bold text-[#2C3032] tracking-widest uppercase truncate">{{ destination || 'New Trip' }}</h1>
                        </div>
                        <button @click="showSettingsModal = true" class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-gray-400 shadow-sm"><i class="fas fa-sliders-h"></i></button>
                    </div>

                    <div v-if="currentTab === 'schedule'" class="flex gap-3 overflow-x-auto no-scrollbar py-2">
                        <button v-for="(day, index) in days" :key="index" @click="selectDay(index)" :class="currentDayIndex === index ? 'day-card-active' : 'day-card-inactive'" class="flex-shrink-0 w-16 h-20 rounded-2xl flex flex-col items-center justify-center border transition-all shadow-sm">
                            <span class="text-[9px] font-bold opacity-60 mb-1 uppercase">Day {{ index + 1 }}</span>
                            <span class="text-sm font-serif font-black">{{ getDayInfo(index).date }}</span>
                        </button>
                        <button @click="addNewDay" class="flex-shrink-0 w-16 h-20 rounded-2xl border-2 border-dashed border-gray-200 text-gray-300 flex items-center justify-center"><i class="fas fa-plus"></i></button>
                    </div>
                </header>

                <main class="flex-1 overflow-y-auto pb-40 no-scrollbar p-6">
                    <div v-if="currentTab === 'money'" class="animate-fade-in">
                        <div class="expense-total-card mb-10 relative">
                            <div class="flex justify-between items-start mb-6">
                                <p class="text-[10px] text-[#C5A059] font-black tracking-[0.2em] uppercase">Grand Total</p>
                                <button @click="openTravelerModal" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-xs text-gray-300 active:scale-90 transition-transform"><i class="fas fa-user-group"></i></button>
                            </div>
                            <h2 class="text-5xl font-serif font-bold tracking-tight">¥ {{ totalJPY.toLocaleString() }}</h2>
                            <p class="text-xs text-gray-400 mt-2">≈ NT$ {{ totalTWD.toLocaleString() }}</p>
                        </div>

                        <h4 class="text-[11px] font-black text-gray-400 tracking-[0.15em] uppercase mb-6 px-1">Member Consumption</h4>
                        <div class="space-y-4 mb-10">
                            <div v-for="member in members" :key="member" class="member-card shadow-sm">
                                <div class="flex justify-between items-center mb-4">
                                    <div class="flex items-center gap-4">
                                        <div class="w-11 h-11 rounded-full bg-gray-100 flex items-center justify-center font-serif font-black text-gray-400 text-lg">{{ member[0] }}</div>
                                        <span class="font-serif font-black text-xl">{{ member }}</span>
                                    </div>
                                    <div class="text-right font-serif font-black text-[#2C3032]">
                                        <p class="text-lg">¥ {{ getMemberStats(member).total.toLocaleString() }}</p>
                                        <p class="text-[9px] text-gray-300 font-sans">≈ NT$ {{ getMemberStats(member).twd.toLocaleString() }}</p>
                                    </div>
                                </div>
                                <div class="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden flex mb-3">
                                    <div class="h-full bg-[#2C3032] transition-all" :style="{ width: getMemberStats(member).percent + '%' }"></div>
                                </div>
                                <div class="flex justify-between items-center text-[9px] font-black tracking-widest text-gray-400 uppercase">
                                    <div class="flex items-center gap-1.5">
                                        <span class="w-1 h-1 rounded-full bg-[#2C3032]"></span>
                                        <span>Shared: ¥ {{ getMemberStats(member).shared.toLocaleString() }}</span>
                                    </div>
                                    <div class="flex items-center gap-1.5">
                                        <span class="w-1 h-1 rounded-full bg-[#C5A059]"></span>
                                        <span>Private: ¥ {{ getMemberStats(member).private.toLocaleString() }}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <h4 class="text-[11px] font-black text-gray-400 tracking-[0.15em] uppercase mb-6 px-1">Settlement</h4>
                        <div v-if="settlement.amount > 0" class="member-card !bg-[#F9F8F6] border-none mb-10 animate-fade-in">
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-3">
                                    <span class="font-serif font-black text-lg">{{ settlement.from }}</span>
                                    <span class="pays-pill">PAYS</span>
                                    <span class="font-serif font-black text-lg">{{ settlement.to }}</span>
                                </div>
                                <div class="text-right">
                                    <p class="text-xl font-serif font-black text-red-800">¥ {{ settlement.amount.toLocaleString() }}</p>
                                </div>
                            </div>
                        </div>

                        <div v-for="(group, date) in groupedExpenses" :key="date" class="mb-6">
                            <div @click="toggleDateCollapse(date)" class="flex justify-between items-center mb-2 px-1 border-b border-gray-100 pb-2 cursor-pointer active:opacity-60 transition-opacity">
                                <div class="flex items-center gap-2">
                                    <i class="fas text-[9px] text-gray-300 transition-transform" :class="collapsedDates[date] ? 'fa-chevron-right' : 'fa-chevron-down'"></i>
                                    <span class="text-[11px] font-black text-gray-400 tracking-widest uppercase">{{ formatDisplayDate(date) }}</span>
                                </div>
                                <span class="text-[11px] font-black font-serif text-[#2C3032]">¥ {{ group.total.toLocaleString() }}</span>
                            </div>
                            <div v-show="!collapsedDates[date]" class="space-y-3 animate-fade-in">
                                <div v-for="(exp, idx) in group.items" :key="idx" class="member-card !py-4 shadow-sm active:scale-[0.98] transition-transform" @click="openEditExpenseModal(exp)">
                                    <div class="flex justify-between items-center">
                                        <div class="flex-1 pr-4">
                                            <h5 class="text-lg font-serif font-black leading-tight">{{ exp.title }}</h5>
                                            <p v-if="exp.note" class="text-xs text-[#C5A059] mt-1 italic">{{ exp.note }}</p>
                                            <p class="text-[10px] text-gray-400 mt-1">{{ exp.payer }} 付款 | {{ exp.type }}</p>
                                        </div>
                                        <div class="font-serif font-black text-[#2C3032] whitespace-nowrap text-right">¥ {{ (Number(exp.amount) || 0).toLocaleString() }}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div v-if="currentTab === 'schedule'" class="space-y-4">
                        <div v-for="(item, index) in currentDayItems" :key="index" class="schedule-item-card" @click="openEditModal(index)">
                            <div class="w-1 bg-[#C5A059] rounded-full mr-4"></div>
                            <div class="flex-1 text-left min-w-0">
                                <span class="text-[10px] font-black text-[#C5A059] tracking-widest">{{ item.time }}</span>
                                <h3 class="text-lg font-serif font-black text-[#2C3032] mt-0.5 truncate">{{ item.title }}</h3>
                            </div>
                        </div>
                    </div>
                </main>

                <button @click="onFabClick" class="fab-btn shadow-2xl">
                    <i class="fas" :class="currentTab === 'money' ? 'fa-pen-nib' : 'fa-plus'"></i>
                </button>

                <nav class="nav-bar-container">
                    <button @click="currentTab='schedule'" :class="currentTab==='schedule'?'nav-item-active':''" class="nav-item"><i class="fas fa-map"></i><span>SCHEDULE</span></button>
                    <button @click="currentTab='money'" :class="currentTab==='money'?'nav-item-active':''" class="nav-item"><i class="fas fa-credit-card"></i><span>BUDGET</span></button>
                    <button @click="currentTab='memo'" :class="currentTab==='memo'?'nav-item-active':''" class="nav-item"><i class="fas fa-book-open"></i><span>MEMO</span></button>
                </nav>
            </template>

            <div v-if="showTravelerModal" class="modal-mask" @click.self="showTravelerModal = false">
                <div class="modal-card !p-8 !max-w-[22rem]">
                    <h2 class="text-center font-serif font-black text-2xl mb-8 tracking-widest text-[#2C3032]">Travelers</h2>
                    <div class="space-y-4 mb-8">
                        <div v-for="(name, index) in tempMembers" :key="index" class="flex items-center gap-4">
                            <span class="font-serif font-black text-[#C5A059] text-sm w-4">{{ index + 1 }}</span>
                            <div class="flex-1 relative">
                                <input v-model="tempMembers[index]" class="premium-input !py-3 !px-6 !bg-gray-100 !rounded-full font-bold">
                                <button @click="removeTraveler(index)" class="absolute right-3 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full bg-gray-200 text-gray-400 text-[10px] flex items-center justify-center"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                        <button @click="addTraveler" class="w-full py-4 border-2 border-dashed border-[#C5A059]/30 rounded-full text-[#C5A059] text-[11px] font-black uppercase tracking-widest">+ Add New Traveler</button>
                    </div>
                    <button @click="saveTravelers" class="btn-gold !bg-[#2C3032] !text-white !rounded-2xl py-5 text-sm uppercase tracking-widest">Save Changes</button>
                </div>
            </div>
