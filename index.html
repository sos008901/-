<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>栞 | Travel Assistant</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Cinzel:wght@500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app" v-cloak>
    <div id="app-container" class="bg-washi relative w-full h-full flex flex-col">
        
        <div class="cloud-status absolute top-safe-top left-5 mt-2 z-50 text-[10px] text-theme-accent flex items-center gap-2">
            <i class="fas" :class="isSyncing ? 'fa-spinner animate-spin' : 'fa-github'"></i>
            <span>{{ isSyncing ? '同步中' : '已同步' }}</span>
        </div>

        <transition name="fade"><div v-if="toast.show" class="toast-box">{{ toast.message }}</div></transition>

        <template v-if="!isInitialized">
            <div class="fixed inset-0 z-[1500] bg-[#2C3032] text-white flex flex-col items-center justify-center p-8">
                <h1 class="text-7xl font-serif mb-10 tracking-widest">栞</h1>
                <div class="w-full max-w-xs space-y-4">
                    <input v-model="ghToken" type="password" class="login-input" placeholder="GitHub Token">
                    <input v-model="ghRepo" class="login-input" placeholder="帳號/專案名稱">
                    <div class="grid grid-cols-2 gap-2">
                        <input v-model="destination" class="login-input" placeholder="目的地">
                        <input v-model="startDate" type="date" class="login-input">
                    </div>
                    <button @click="saveSettings" class="w-full py-4 bg-theme-accent text-theme-main font-bold rounded-xl shadow-lg">進入旅程</button>
                </div>
            </div>
        </template>

        <template v-else>
            <header class="glass-panel pt-[calc(env(safe-area-inset-top)+40px)] px-6 pb-4 shadow-sm">
                <div class="flex justify-between items-end mb-4">
                    <div>
                        <p class="text-[10px] text-theme-accent font-bold tracking-widest">{{ startDate || '未設定日期' }}</p>
                        <h1 class="text-3xl font-serif font-medium text-theme-main">{{ destination || '我的旅程' }}</h1>
                    </div>
                    <button @click="showSettingsModal = true" class="w-10 h-10 rounded-full border border-gray-100 flex items-center justify-center text-theme-sub"><i class="fas fa-cog"></i></button>
                </div>

                <div v-if="currentTab === 'schedule'" class="flex gap-3 overflow-x-auto no-scrollbar pb-2 items-center">
                    <div v-for="(day, index) in days" :key="index" class="relative flex-shrink-0 group">
                        <button @click="currentDayIndex = index"
                                :class="currentDayIndex === index ? 'bg-theme-main text-white' : 'bg-white text-gray-400 border border-gray-100'"
                                class="w-16 h-20 rounded-2xl flex flex-col items-center justify-center transition-all shadow-sm">
                            <span class="text-[10px] opacity-70">Day {{ index + 1 }}</span>
                            <span class="text-xs font-bold">{{ getDayInfo(index).date }}</span>
                            <span class="text-[10px]">{{ getDayInfo(index).week }}</span>
                        </button>
                        
                        <div v-if="currentDayIndex === index" class="absolute -bottom-2 left-1/2 -translate-x-1/2 flex gap-1 bg-white shadow-md rounded-full px-2 py-1 border border-gray-100 scale-90">
                            <button @click.stop="moveDay(index, -1)" v-if="index > 0" class="text-theme-main p-1 hover:text-theme-accent"><i class="fas fa-caret-left"></i></button>
                            <button @click.stop="deleteDay(index)" class="text-red-400 p-1 hover:text-red-600"><i class="fas fa-trash-alt text-[10px]"></i></button>
                            <button @click.stop="moveDay(index, 1)" v-if="index < days.length - 1" class="text-theme-main p-1 hover:text-theme-accent"><i class="fas fa-caret-right"></i></button>
                        </div>
                    </div>
                    
                    <button @click="addNewDay" class="flex-shrink-0 w-16 h-20 rounded-2xl border-2 border-dashed border-gray-200 text-gray-300 flex flex-col items-center justify-center active:bg-gray-50 transition-colors">
                        <i class="fas fa-plus mb-1"></i>
                        <span class="text-[10px]">Add Day</span>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto pb-40 no-scrollbar p-5">
                <div v-if="currentTab === 'schedule'" class="space-y-4">
                    <div v-for="(item, index) in currentDayItems" :key="index" class="bg-white p-5 rounded-3xl shadow-sm border-l-4 border-theme-main relative group">
                        <span class="text-xs font-bold text-theme-accent">{{ item.time }}</span>
                        <h3 class="text-lg font-serif font-bold">{{ item.title }}</h3>
                    </div>
                    <div v-if="currentDayItems.length === 0" class="text-center py-24 text-gray-300 text-sm">點擊「+」新增當天行程</div>
                </div>

                <div v-if="currentTab === 'money'" class="space-y-3">
                    <div v-for="(exp, idx) in expenses" :key="idx" class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                        <span class="font-bold text-theme-main">{{ exp.item }}</span>
                        <span class="font-serif text-theme-accent font-black">$ {{ exp.amount }}</span>
                    </div>
                    <div v-if="expenses.length === 0" class="text-center py-20 text-gray-300 text-sm">尚未有支出紀錄</div>
                </div>

                <div v-if="currentTab === 'memo'" class="space-y-4">
                    <div v-for="(memo, idx) in memos" :key="idx" class="bg-[#FFFCEB] p-5 rounded-xl shadow-sm border-b-2 border-yellow-100 text-sm">
                        {{ memo.content }}
                    </div>
                    <div v-if="memos.length === 0" class="text-center py-20 text-gray-300 text-sm">寫些筆記記錄靈感吧</div>
                </div>
            </main>

            <button @click="onFabClick" class="fab-btn shadow-2xl active:scale-90 transition-transform"><i class="fas fa-plus"></i></button>

            <nav class="glass-panel h-[80px] flex justify-around items-center border-t border-gray-100">
                <button @click="currentTab='schedule'" :class="currentTab==='schedule'?'text-theme-accent':'text-theme-sub'"><i class="fas fa-map-marked-alt text-xl"></i></button>
                <button @click="currentTab='money'" :class="currentTab==='money'?'text-theme-accent':'text-theme-sub'"><i class="fas fa-wallet text-xl"></i></button>
                <button @click="currentTab='memo'" :class="currentTab==='memo'?'text-theme-accent':'text-theme-sub'"><i class="fas fa-book text-xl"></i></button>
            </nav>
        </template>

        <div v-if="showAddModal" class="modal-mask" @click.self="showAddModal = false">
            <div class="modal-card">
                <h3 class="text-center font-serif font-bold mb-6 border-b pb-4">新增 Day {{currentDayIndex+1}} 行程</h3>
                <div class="space-y-4">
                    <input v-model="newItem.time" class="input-rounded" placeholder="時間 (如 10:00)">
                    <input v-model="newItem.title" class="input-rounded" placeholder="景點名稱">
                    <button @click="addItem" class="w-full py-4 bg-theme-main text-white font-bold rounded-3xl">確認新增</button>
                </div>
            </div>
        </div>

        <div v-if="showMoneyModal" class="modal-mask" @click.self="showMoneyModal = false">
            <div class="modal-card">
                <h3 class="text-center font-serif font-bold mb-6 border-b pb-4">新增支出</h3>
                <div class="space-y-4">
                    <input v-model="newExpense.item" class="input-rounded" placeholder="消費項目">
                    <input v-model="newExpense.amount" type="number" class="input-rounded" placeholder="金額">
                    <button @click="addExpense" class="w-full py-4 bg-theme-main text-white font-bold rounded-3xl">紀錄支出</button>
                </div>
            </div>
        </div>

        <div v-if="showMemoModal" class="modal-mask" @click.self="showMemoModal = false">
            <div class="modal-card">
                <h3 class="text-center font-serif font-bold mb-6 border-b pb-4">新增備忘</h3>
                <div class="space-y-4">
                    <textarea v-model="newMemo.content" class="input-rounded h-32" placeholder="內容..."></textarea>
                    <button @click="addMemo" class="w-full py-4 bg-theme-main text-white font-bold rounded-3xl">儲存筆記</button>
                </div>
            </div>
        </div>

        <div v-if="showSettingsModal" class="modal-mask" @click.self="showSettingsModal = false">
            <div class="modal-card space-y-4 text-center">
                <h3 class="font-serif font-bold mb-4">旅程設定</h3>
                <div class="text-left space-y-4">
                    <div><label class="text-[10px] text-gray-400 ml-2">目的地</label><input v-model="destination" class="input-rounded text-center"></div>
                    <div><label class="text-[10px] text-gray-400 ml-2">起始日期</label><input v-model="startDate" type="date" class="input-rounded"></div>
                </div>
                <button @click="saveToGitHub" class="w-full py-4 bg-theme-main text-white font-bold rounded-3xl">儲存更改</button>
                <div class="flex gap-2">
                    <button @click="logout" class="flex-1 py-2 text-red-400 text-xs bg-red-50 rounded-xl">登出帳號</button>
                </div>
            </div>
        </div>

    </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
